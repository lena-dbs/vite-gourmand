<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;padding:0;overflow:hidden}iframe{border:0;display:block}</style></head>
<body>
<iframe id="f" src="/" width="1440" height="1300"></iframe>
<script>
const p = new URLSearchParams(location.search);
const y = parseInt(p.get('y') || '0', 10);
const w = parseInt(p.get('w') || '1440', 10);
const h = parseInt(p.get('h') || '1300', 10);
const f = document.getElementById('f');
f.width = w; f.height = h;
f.addEventListener('load', () => {
  setTimeout(() => { f.contentWindow.scrollTo(0, y); }, 300);
});
</script>
</body></html>
